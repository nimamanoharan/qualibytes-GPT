# ============================================================
#  Qualibytes GPT — GitLab CI/CD Pipeline
#  File: .gitlab-ci.yml
#  Stages: build → push → deploy → verify
# ============================================================

stages:
  - build
  - push
  - deploy
  - verify

variables:
  FRONTEND_IMAGE: $DOCKER_USERNAME/qualibytes-frontend
  BACKEND_IMAGE:  $DOCKER_USERNAME/qualibytes-backend

# ── STAGE 1: BUILD ──────────────────────────────────────────
build-frontend:
  stage: build
  tags:
    - ec2
  script:
    - echo "=== Building Frontend Image ==="
    - docker build -t $FRONTEND_IMAGE:$CI_PIPELINE_IID ./frontend
    - docker tag  $FRONTEND_IMAGE:$CI_PIPELINE_IID $FRONTEND_IMAGE:latest
    - docker images | grep qualibytes

build-backend:
  stage: build
  tags:
    - ec2
  script:
    - echo "=== Building Backend Image ==="
    - docker build -t $BACKEND_IMAGE:$CI_PIPELINE_IID ./backend
    - docker tag  $BACKEND_IMAGE:$CI_PIPELINE_IID $BACKEND_IMAGE:latest

# ── STAGE 2: PUSH ───────────────────────────────────────────
push-images:
  stage: push
  tags:
    - ec2
  script:
    - echo "=== Pushing images to Docker Hub ==="
    - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
    - docker push $FRONTEND_IMAGE:latest
    - docker push $FRONTEND_IMAGE:$CI_PIPELINE_IID
    - docker push $BACKEND_IMAGE:latest
    - docker push $BACKEND_IMAGE:$CI_PIPELINE_IID
    - docker logout
    - echo "Push complete!"

# ── STAGE 3: DEPLOY ─────────────────────────────────────────
deploy-to-ec2:
  stage: deploy
  tags:
    - ec2
  before_script:
    - apt-get update -qq && apt-get install -y openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $APP_SERVER_IP >> ~/.ssh/known_hosts
  script:
    - echo "=== Deploying to App Server ==="
    - scp docker-compose.yml ubuntu@$APP_SERVER_IP:~/docker-compose.yml
    - |
      ssh ubuntu@$APP_SERVER_IP "
        echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin

        docker-compose pull frontend backend
        docker-compose up -d --no-deps frontend backend

        if ! docker exec qualibytes-ollama ollama list 2>/dev/null | grep -q tinyllama; then
          echo 'Pulling tinyllama model...'
          docker exec qualibytes-ollama ollama pull tinyllama
        fi

        docker-compose ps
        docker logout
      "
    - echo "Deployment done! URL: http://$APP_SERVER_IP"
  environment:
    name: production
    url: http://$APP_SERVER_IP
  only:
    - main

# ── STAGE 4: VERIFY ─────────────────────────────────────────
health-check:
  stage: verify
  tags:
    - ec2
  before_script:
    - apt-get update -qq && apt-get install -y openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $APP_SERVER_IP >> ~/.ssh/known_hosts
  script:
    - echo "=== Running Health Check ==="
    - |
      ssh ubuntu@$APP_SERVER_IP "
        sleep 5
        curl --retry 5 --retry-delay 3 --fail http://localhost:5000/health \
          && echo 'Backend: HEALTHY' \
          || (echo 'Backend: UNHEALTHY' && exit 1)
      "
  only:
    - main
