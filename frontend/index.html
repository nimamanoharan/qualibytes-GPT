<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Qualibytes GPT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #ececec;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    header {
      background: #1a1d27;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2d3a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    header .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    header span {
      font-size: 11px; color: #6c63ff;
      background: rgba(108,99,255,0.15);
      padding: 2px 8px; border-radius: 20px;
      margin-left: 4px;
    }
    .model-badge {
      margin-left: auto;
      font-size: 11px; color: #3ecfcf;
      background: rgba(62,207,207,0.1);
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid rgba(62,207,207,0.2);
    }

    /* ---- Chat Area ---- */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat-window::-webkit-scrollbar { width: 6px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #555;
    }
    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-size: 22px; color: #888; margin-bottom: 8px; }
    .welcome p { font-size: 14px; color: #555; }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; min-width: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .user .avatar { background: linear-gradient(135deg, #6c63ff, #3ecfcf); }
    .bot  .avatar { background: #1e2235; border: 1px solid #2a2d3a; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.7;
      max-width: calc(100% - 50px);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user .bubble {
      background: #6c63ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bot .bubble {
      background: #1a1d27;
      color: #e0e0e0;
      border: 1px solid #2a2d3a;
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex; align-items: center; gap: 6px;
      padding: 14px 18px;
    }
    .dot {
      width: 8px; height: 8px;
      background: #6c63ff; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ---- Input Area ---- */
    .input-area {
      background: #1a1d27;
      border-top: 1px solid #2a2d3a;
      padding: 16px;
    }
    .input-wrapper {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .input-wrapper:focus-within { border-color: #6c63ff; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ececec;
      font-size: 15px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
    }
    #user-input::placeholder { color: #444; }

    #send-btn {
      background: #6c63ff;
      border: none;
      border-radius: 8px;
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: #5a52e0; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: #2a2d3a; cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; fill: white; }

    .hint { text-align: center; font-size: 11px; color: #333; margin-top: 8px; }

    /* Clear button */
    #clear-btn {
      background: transparent;
      border: 1px solid #2a2d3a;
      color: #666;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-left: auto;
      display: block;
      max-width: 820px;
      margin: 0 auto 8px auto;
      width: fit-content;
      transition: color 0.2s, border-color 0.2s;
    }
    #clear-btn:hover { color: #aaa; border-color: #444; }
  </style>
</head>
<body>

  <header>
    <div class="logo">🤖</div>
    <h1>Qualibytes GPT <span>Powered by AI</span></h1>
    <div class="model-badge">🦙 tinyllama</div>
  </header>

  <div id="chat-window">
    <div class="welcome" id="welcome">
      <div class="icon">✨</div>
      <h2>Welcome to Qualibytes GPT</h2>
      <p>Your local AI assistant — running on tinyllama via Ollama.<br/>Ask me anything to get started!</p>
    </div>
  </div>

  <div class="input-area">
    <button id="clear-btn" onclick="clearChat()">🗑 Clear Chat</button>
    <div class="input-wrapper">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Message Qualibytes GPT..."
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="hint">Press Enter to send · Shift+Enter for new line · Running locally on your server</p>
  </div>

  <script>
    // Conversation history — ChatGPT style (keeps context)
    let conversationHistory = [];

    const chatWindow  = document.getElementById('chat-window');
    const userInput   = document.getElementById('user-input');
    const sendBtn     = document.getElementById('send-btn');

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    // Enter to send, Shift+Enter for newline
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function appendMessage(role, text) {
      // Remove welcome screen on first message
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '👤' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chatWindow.appendChild(msg);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return bubble;
    }

    function showTyping() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const msg = document.createElement('div');
      msg.className = 'message bot typing';
      msg.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chatWindow.appendChild(msg);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      // Show user message
      appendMessage('user', text);
      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;

      // Add to history
      conversationHistory.push({ role: 'user', content: text });

      // Show typing indicator
      showTyping();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory })
        });

        const data = await response.json();
        removeTyping();

        if (data.error) {
          appendMessage('bot', '⚠️ Error: ' + data.error);
        } else {
          const reply = data.reply;
          appendMessage('bot', reply);
          conversationHistory.push({ role: 'assistant', content: reply });
        }
      } catch (err) {
        removeTyping();
        appendMessage('bot', '⚠️ Could not reach the backend. Is the server running?');
      }

      sendBtn.disabled = false;
      userInput.focus();
    }

    function clearChat() {
      conversationHistory = [];
      chatWindow.innerHTML = `
        <div class="welcome" id="welcome">
          <div class="icon">✨</div>
          <h2>Welcome to Qualibytes GPT</h2>
          <p>Your local AI assistant — running on tinyllama via Ollama.<br/>Ask me anything to get started!</p>
        </div>`;
    }
  </script>
</body>
</html>
